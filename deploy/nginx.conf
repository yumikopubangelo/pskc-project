# ============================================================
# PSKC Nginx Configuration
# Reverse Proxy for Production Deployment
# ============================================================
#
# This configuration provides:
# - HTTP to HTTPS redirect
# - SSL termination
# - Request rate limiting
# - Header forwarding for trusted proxies
# - Path-based routing
#
# For SSL, place your certificates in deploy/ssl/:
#   - server.crt (SSL certificate)
#   - server.key (SSL private key)
#   - ca.crt (optional CA certificate for client auth)
#
# ============================================================

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with response time
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ============================================================
    # Rate Limiting Zones
    # ============================================================
    
    # General API rate limit: 1000 requests per minute
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=1000r/m;
    
    # Strict rate limit for sensitive endpoints
    limit_req_zone $binary_remote_addr zone=sensitive_limit:1m rate=100r/m;
    
    # Connection limit per IP
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ============================================================
    # Upstream Definitions
    # ============================================================
    
    upstream pskc_api {
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ============================================================
    # HTTP Server (Redirect to HTTPS)
    # ============================================================
    
    server {
        listen 80;
        server_name _;
        
        # Health check endpoint for nginx itself
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Redirect all other requests to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    # HTTPS Server
    # ============================================================
    
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL Configuration (uncomment when certificates are available)
        # ssl_certificate /etc/nginx/ssl/server.crt;
        # ssl_certificate_key /etc/nginx/ssl/server.key;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache shared:SSL:10m;
        # ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ============================================================
        # Health Check Endpoints (Public)
        # ============================================================
        
        # Kubernetes liveness probe
        location /health {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://pskc_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Health checks should be fast
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }
        
        # Kubernetes readiness probe
        location /health/ready {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://pskc_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Kubernetes startup probe
        location /health/startup {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://pskc_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # Public Endpoints (Limited Rate)
        # ============================================================
        
        location ~ ^/(keys/access|keys/store)$ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn addr 10;
            
            proxy_pass http://pskc_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts for key operations
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ============================================================
        # Metrics Endpoints (Internal/Operational)
        # ============================================================
        
        location ~ ^/metrics {
            # Metrics are operational - allow from internal networks only
            # In production, restrict by IP or use network policies
            limit_req zone=api_limit burst=100 nodelay;
            
            proxy_pass http://pskc_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable request buffering for streaming metrics
            proxy_buffering off;
            proxy_cache off;
        }

        # ============================================================
        # ML Endpoints (Operational)
        # ============================================================
        
        location ~ ^/ml {
            limit_req zone=api_limit burst=30 nodelay;
            
            proxy_pass http://pskc_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # ============================================================
        # Admin/Security Endpoints (Restricted)
        # ============================================================
        
        location ~ ^/(admin|internal|security|debug) {
            # Strict rate limiting for sensitive endpoints
            limit_req zone=sensitive_limit burst=10 nodelay;
            limit_conn addr 5;
            
            # Block external access - only allow from private networks
            # In production, configure allowed source IPs
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # allow 192.168.0.0/16;
            # deny all;
            
            proxy_pass http://pskc_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # Cache Management (Operational)
        # ============================================================
        
        location ~ ^/cache {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://pskc_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # Prefetch Endpoints (Operational)
        # ============================================================
        
        location ~ ^/prefetch {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://pskc_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # Simulation Endpoints (Development Only)
        # ============================================================
        
        location ~ ^/simulation {
            # Block in production or restrict to internal networks
            # For now, apply stricter rate limit
            limit_req zone=sensitive_limit burst=5 nodelay;
            
            proxy_pass http://pskc_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # Default API Routes
        # ============================================================
        
        location / {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn addr 20;
            
            proxy_pass http://pskc_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # ============================================================
        # Error Pages
        # ============================================================
        
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
